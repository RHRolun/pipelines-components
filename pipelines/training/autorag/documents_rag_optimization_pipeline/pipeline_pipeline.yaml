          AWS_S3_BUCKET\"] = AWS_S3_BUCKET or os.environ.get(\"AWS_S3_BUCKET\")\\\
          n',\n                # \"\\n\",\n                'required_vars = [\"AWS_ACCESS_KEY_ID\"\
          , \"AWS_SECRET_ACCESS_KEY\", \"AWS_S3_ENDPOINT\", \"AWS_DEFAULT_REGION\"\
          , \"AWS_S3_BUCKET\"]\\n',\n                \"missing = [var for var in required_vars\
          \ if not os.environ.get(var)]\\n\",\n                \"if missing:\\n\"\
          ,\n                '    raise ValueError(f\"Missing required environment\
          \ variables: {{missing}}\")',\n            ],\n        ),\n        \"MD_1_3\"\
          : NotebookCell(\n            cell_type=\"markdown\",\n            source=\"\
          ### Prepare S3 client\\n\\nCreates an S3 client session using the provided\
          \ credentials. This client will be used to discover and download documents\
          \ from the specified S3 bucket.\",\n        ),\n        \"S3_CLIENT\": NotebookCell(\n\
          \            cell_type=\"code\",\n            source=[\n               \
          \ \"session = boto3.session.Session(\\n\",\n                '    aws_access_key_id=os.environ[\"\
          AWS_ACCESS_KEY_ID\"],\\n',\n                '    aws_secret_access_key=os.environ[\"\
          AWS_SECRET_ACCESS_KEY\"],\\n',\n                \")\\n\",\n            \
          \    \"s3_client = session.client(\\n\",\n                \"    service_name='s3',\\\
          n\",\n                '    endpoint_url=os.environ[\"AWS_S3_ENDPOINT\"],\\\
          n',\n                \")\",\n            ],\n        ),\n        \"CHAPTER_2\"\
          : NotebookCell(\n            cell_type=\"markdown\",\n            source=[\n\
          \                \"---\\n\",\n                \"\\n\",\n               \
          \ \"## Process input documents\\n\",\n                \"\\n\",\n       \
          \         \"This section handles document discovery and text extraction.\
          \ Documents are first discovered in S3 storage, then their content is extracted\
          \ and converted to markdown format for further processing.\",\n        \
          \    ],\n        ),\n        \"MD_2_1\": NotebookCell(\n            cell_type=\"\
          markdown\",\n            source=[\n                \"The data processing\
          \ pipeline prepares documents for the RAG system in multiple steps. Each\
          \ step runs as a standalone component with outputs stored under `step_outputs/`.\
          \ \\n\",\n                \"\\n\",\n                \"| Step | Component\
          \ | Purpose |\\n\",\n                \"|------|-----------|---------|\"\
          ,\n                \"| 1 | **Documents discovery** | List documents in the\
          \ bucket, prioritize benchmark-referenced docs, apply a size cap, and write\
          \ a JSON manifest (no content download). |\\n\",\n                \"| 2\
          \ | **Text extraction** | Download the listed documents from S3 and extract\
          \ text to Markdown using Docling. |\",\n            ],\n        ),\n   \
          \     \"LOAD_DATA\": NotebookCell(\n            cell_type=\"code\",\n  \
          \          source=[\n                \"from kfp_components.components.data_processing.autorag.documents_discovery.component\
          \ import documents_discovery\\n\",\n                \"from kfp_components.components.data_processing.autorag.text_extraction.component\
          \ import text_extraction\\n\",\n                \"\\n\",\n             \
          \   'step_output_dir = Path(\"./step_outputs\")\\n',\n                \"\
          input_data_bucket_name = os.environ['AWS_S3_BUCKET']\\n\",\n           \
          \     'input_data_key = \"{INPUT_DATA_KEY}\"\\n',\n                \"step_output_dir.mkdir(parents=True,\
          \ exist_ok=True)\",\n            ],\n        ),\n        \"MD_2_2\": NotebookCell(\n\
          \            cell_type=\"markdown\",\n            source=[\n           \
          \     \"### Documents discovery\\n\",\n                \"\\n\",\n      \
          \          \"Lists objects in the S3 input bucket, filters by supported\
          \ extensions (e.g., `.pdf`, `.docx`, `.pptx`, `.md`, `.html`, `.txt`), and\
          \ builds a document set. Documents referenced in the benchmark are prioritized,\
          \ then others are added until a configurable size limit (1 GB by default)\
          \ is reached. This step does not download document contents but writes a\
          \ JSON manifest (`documents_descriptor.json`) containing the bucket, prefix,\
          \ and list of selected object keys and sizes for the next step.\",\n   \
          \         ],\n        ),\n        \"DOCUMENTS_DISCOVERY\": NotebookCell(\n\
          \            cell_type=\"code\",\n            source=[\n               \
          \ \"\\n\",\n                'discovered_documents_out = SimpleNamespace(path=str(step_output_dir\
          \ / \"discovered_documents\"))\\n',\n                \"\\n\",\n        \
          \        \"documents_discovery.python_func(\\n\",\n                \"  \
          \  input_data_bucket_name=input_data_bucket_name,\\n\",\n              \
          \  \"    input_data_path=input_data_key,\\n\",\n                \"    discovered_documents=discovered_documents_out,\\\
          n\" \")\\n\",\n                \"\\n\",\n                'descriptor_path\
          \ = step_output_dir / \"discovered_documents\" / \"documents_descriptor.json\"\
          \\n',\n                \"with open(descriptor_path) as f:\\n\",\n      \
          \          \"    descriptor = json.load(f)\\n\",\n                \"\\n\"\
          ,\n                \"print(json.dumps(descriptor, indent=4, ensure_ascii=False))\"\
          ,\n            ],\n        ),\n        \"MD_2_3\": NotebookCell(\n     \
          \       cell_type=\"markdown\",\n            source=[\n                \"\
          ### Text extraction\\n\",\n                \"\\n\",\n                \"\
          Reads the `documents_descriptor.json` produced by the discovery step, downloads\
          \ each listed document from S3 into a temporary directory, and runs **Docling**\
          \ to extract text. Output is one Markdown file per document (e.g., `document_0.md`,\
          \ `document_1.md`) written to the artifact output path. These files form\
          \ the final text corpus for the RAG system.\",\n            ],\n       \
          \ ),\n        \"TEXT_EXTRACTION\": NotebookCell(\n            cell_type=\"\
          code\",\n            source=[\n                'descriptor_in = SimpleNamespace(path=str(step_output_dir\
          \ / \"discovered_documents\"))\\n',\n                'extracted_text_out\
          \ = SimpleNamespace(path=str(step_output_dir / \"extracted_text\"))\\n',\n\
          \                \"\\n\",\n                \"text_extraction.python_func(\\\
          n\",\n                \"    documents_descriptor=descriptor_in,\\n\",\n\
          \                \"    extracted_text=extracted_text_out,\\n\",\n      \
          \          \")\",\n            ],\n        ),\n        \"CHAPTER_3\": NotebookCell(\n\
          \            cell_type=\"markdown\",\n            source=[\n           \
          \     \"---\\n\",\n                \"\\n\",\n                \"## Upload\
          \ documents content into vector store\\n\",\n                \"\\n\",\n\
          \                \"This section configures the vector store, chunks the\
          \ extracted documents, and uploads embeddings to the database for semantic\
          \ search.\\n\",\n                \"\\n\",\n                \"&#x1F516; **Note**:\
          \ This notebook requires a Llama Stack server to be available for the AutoRAG\
          \ experiment. Detailed instructions on how to setup Llama Stack server for\
          \ AutoRAG can be found here: https://github.com/LukaszCmielowski/prototypes/blob/main/llamastack/SETUP.md\"\
          ,\n            ],\n        ),\n        \"MD_3_1\": NotebookCell(\n     \
          \       cell_type=\"markdown\",\n            source=[\n                \"\
          ### Prepare Llama Stack Client\\n\",\n                \"\\n\",\n       \
          \         \"The Llama Stack client provides the interface to the embedding\
          \ models and vector database. This section initializes the client using\
          \ API credentials from environment variables or prompts.\\n\",\n       \
          \         \"\\n\",\n                \"**Prerequisites:**\\n\",\n       \
          \         \"- `LLAMA_STACK_CLIENT_API_KEY`: Your authentication key for\
          \ the Llama Stack API\\n\",\n                \"- `LLAMA_STACK_CLIENT_BASE_URL`:\
          \ The base URL of your Llama Stack instance\\n\",\n                \"\\\
          n\",\n                \"&#x1F516; **Note**: To use ai4rag with Llama Stack,\
          \ at least 1 foundation model, 1 embedding model, and a connected Milvus\
          \ instance should be available on the server side.\",\n            ],\n\
          \        ),\n        \"LS_CLIENT\": NotebookCell(\n            cell_type=\"\
          code\",\n            source=[\n                \"from llama_stack_client\
          \ import LlamaStackClient\\n\",\n                \"\\n\",\n            \
          \    'if not os.getenv(\"LLAMA_STACK_CLIENT_API_KEY\") or not os.getenv(\"\
          LLAMA_STACK_CLIENT_BASE_URL\"):\\n',\n                '    os.environ[\"\
          LLAMA_STACK_CLIENT_API_KEY\"] = getpass.getpass(\"Please enter \\'LLAMA_STACK_CLIENT_API_KEY\\\
          ': \")\\n',\n                '    os.environ[\"LLAMA_STACK_CLIENT_BASE_URL\"\
          ] = getpass.getpass(\"Please enter \\'LLAMA_STACK_CLIENT_BASE_URL\\': \"\
          )\\n',\n                \"\\n\",\n                \"client = LlamaStackClient(\\\
          n\",\n                '    base_url=os.getenv(\"LLAMA_STACK_CLIENT_BASE_URL\"\
          ),\\n',\n                '    api_key=os.getenv(\"LLAMA_STACK_CLIENT_API_KEY\"\
          ),\\n',\n                \")\",\n            ],\n        ),\n        \"\
          MD_3_2\": NotebookCell(\n            cell_type=\"markdown\",\n         \
          \   source=[\n                \"### Prepare chunker\\n\",\n            \
          \    \"\\n\",\n                \"The chunker splits extracted documents\
          \ into smaller chunks for more effective retrieval. Configuration includes:\\\
          n\",\n                \"- **Chunking Method**: The algorithm used to split\
          \ text (e.g., recursive character splitting)\\n\",\n                \"-\
          \ **Chunk Size**: Maximum number of characters per chunk\\n\",\n       \
          \         \"- **Chunk Overlap**: Number of overlapping characters between\
          \ consecutive chunks to preserve context\\n\",\n                \"\\n\"\
          ,\n                \"Proper chunking ensures that retrieved context is both\
          \ relevant and fits within the model's context window.\",\n            ],\n\
          \        ),\n        \"CHUNKER\": NotebookCell(\n            cell_type=\"\
          code\",\n            source=[\n                \"from ai4rag.rag.chunking\
          \ import LangChainChunker\\n\",\n                \"\\n\",\n            \
          \    'chunking_method = \"{CHUNKING_METHOD}\"\\n',\n                \"chunk_size\
          \ = {CHUNK_SIZE}\\n\",\n                \"chunk_overlap = {CHUNK_OVERLAP}\\\
          n\",\n                \"\\n\",\n                \"chunker = LangChainChunker(method=chunking_method,\
          \ chunk_size=chunk_size, chunk_overlap=chunk_overlap)\\n\",\n          \
          \  ],\n        ),\n        \"MD_3_3\": NotebookCell(\n            cell_type=\"\
          markdown\",\n            source=[\n                \"### Initialize vector\
          \ store\\n\",\n                \"\\n\",\n                \"The vector store\
          \ manages document embeddings and enables semantic search. This section\
          \ configures:\\n\",\n                \"- **Embedding Model**: Converts text\
          \ chunks into vector representations\\n\",\n                \"- **Vector\
          \ Database Provider**: The backend storage system (e.g., Milvus)\\n\",\n\
          \                \"- **Distance Metric**: How similarity is calculated (cosine,\
          \ euclidean, etc.)\\n\",\n                \"- **Collection Name**: A named\
          \ collection where embeddings are stored\\n\",\n                \"\\n\"\
          ,\n                \"The vector store is initialized and ready to receive\
          \ document chunks.\",\n            ],\n        ),\n        \"VECTOR_STORE\"\
          : NotebookCell(\n            cell_type=\"code\",\n            source=[\n\
          \                \"from ai4rag.rag.embedding.llama_stack import LSEmbeddingModel,\
          \ LSEmbeddingParams\\n\",\n                \"from ai4rag.rag.vector_store.llama_stack\
          \ import LSVectorStore\\n\",\n                \"\\n\",\n               \
          \ 'model_id = \"{MODEL_ID}\"\\n',\n                \"params = LSEmbeddingParams(**{EMBEDDING_PARAMS})\\\
          n\",\n                \"\\n\",\n                \"embedding_model = LSEmbeddingModel(client=client,\
          \ model_id=model_id, params=params)\\n\",\n                \"\\n\",\n  \
          \              'provider_id = \"{PROVIDER_ID}\"\\n',\n                'distance_metric\
