          markdown\",\n            source=[\n                \"---\\n\",\n       \
          \         \"\\n\",\n                \"## Setup\\n\",\n                \"\
          \\n\",\n                \"This section sets up the notebook environment\
          \ by installing required packages, importing libraries, and configuring\
          \ access to S3 storage.\\n\",\n                \"\\n\",\n              \
          \  \"### Install packages\\n\",\n                \"\\n\",\n            \
          \    \"Install all required Python packages for document processing and\
          \ RAG operations:\\n\",\n                \"- **boto3**: AWS SDK for Python\
          \ to interact with S3 storage\\n\",\n                \"- **pipelines-components**:\
          \ Red Hat's pipeline components for data processing\\n\",\n            \
          \    \"- **docling**: Document processing and text extraction library\\\
          n\",\n                \"- **ai4rag**: The AutoRAG framework for building\
          \ RAG applications\",\n            ],\n        ),\n        \"DEPENDENCIES\"\
          : NotebookCell(\n            cell_type=\"code\",\n            source=[\n\
          \                \"!pip install boto3 | tail -n 1\\n\",\n              \
          \  \"!pip install -U --no-cache-dir git+https://github.com/LukaszCmielowski/pipelines-components.git@rhoai_autorag\
          \ | tail -n 1\\n\",\n                \"!pip install docling | tail -n 1\\\
          n\",\n                \"!pip install 'ai4rag' | tail -n 1\",\n         \
          \   ],\n        ),\n        \"MD_1_1\": NotebookCell(\n            cell_type=\"\
          markdown\",\n            source=\"### Import required libraries\\n\\nImport\
          \ all necessary Python modules and configure logging to suppress verbose\
          \ output from component loggers.\",\n        ),\n        \"MAIN_IMPORTS\"\
          : NotebookCell(\n            cell_type=\"code\",\n            source=[\n\
          \                \"import os\\n\",\n                \"import json\\n\",\n\
          \                \"import logging\\n\",\n                \"from pathlib\
          \ import Path\\n\",\n                \"from types import SimpleNamespace\\\
          n\",\n                \"import getpass\\n\",\n                \"\\n\",\n\
          \                \"import warnings\\n\",\n                'warnings.filterwarnings(\"\
          ignore\")\\n',\n                \"\\n\",\n                \"import boto3\\\
          n\",\n                \"from langchain_core.documents import Document\\\
          n\",\n                \"\\n\",\n                \"for logger_name in (\\\
          n\",\n                '        \"Test Data Loader component logger\",\\\
          n',\n                '        \"Document Loader component logger\",\\n',\n\
          \                '        \"Text Extraction component logger\",\\n',\n \
          \               \"):\\n\",\n                \"    logging.getLogger(logger_name).propagate\
          \ = False\",\n            ],\n        ),\n        \"MD_1_2\": NotebookCell(\n\
          \            cell_type=\"markdown\",\n            source=[\n           \
          \     \"### Configure S3 credentials\\n\",\n                \"\\n\",\n \
          \               \"To load documents from S3-compatible object storage, you\
          \ need to provide credentials. If you're using OpenShift AI, these can be\
          \ configured as data connections.\\n\",\n                \"\\n\",\n    \
          \            \"&#x1F4CC; **Action**: Provide the credentials for your S3\
          \ instance if they are not already set in the notebook environment.\\n\"\
          ,\n                \"\\n\",\n                \"&#x1F4A1; **Tip**: In the\
          \ project, open **Connections** and add an **S3 compatible object storage\
          \ connection** to a bucket you will use for documents and test data. Open\
          \ **Workbenches**, edit your workbench, and attach the S3 connection you\
          \ created so the notebook can read from the bucket. Save and restart the\
          \ workbench if prompted.\",\n            ],\n        ),\n        \"AWS_ENV\"\
          : NotebookCell(\n            cell_type=\"code\",\n            source=[\n\
          \                # 'AWS_ACCESS_KEY_ID = \"\"\\n',\n                # 'AWS_SECRET_ACCESS_KEY\
          \ = \"\"\\n',\n                # 'AWS_S3_ENDPOINT = \"\"\\n',\n        \
          \        # 'AWS_DEFAULT_REGION = \"\"\\n',\n                # 'AWS_S3_BUCKET\
          \ = \"\"\\n',\n                # \"\\n\",\n                # 'os.environ[\"\
          AWS_ACCESS_KEY_ID\"] = AWS_ACCESS_KEY_ID or os.environ.get(\"AWS_ACCESS_KEY_ID\"\
          )\\n',\n                # 'os.environ[\"AWS_SECRET_ACCESS_KEY\"] = AWS_SECRET_ACCESS_KEY\
          \ or os.environ.get(\"AWS_SECRET_ACCESS_KEY\")\\n',\n                # 'os.environ[\"\
