root:
  dag:
    tasks:
      documents-discovery:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-documents-discovery
        dependentTasks:
        - test-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            input_data_bucket_name:
              componentInputParameter: input_data_bucket_name
            input_data_path:
              componentInputParameter: input_data_key
        taskInfo:
          name: documents-discovery
      leaderboard-evaluation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-leaderboard-evaluation
        dependentTasks:
        - rag-templates-optimization
        inputs:
          artifacts:
            rag_patterns:
              taskOutputArtifact:
                outputArtifactKey: rag_patterns
                producerTask: rag-templates-optimization
        taskInfo:
          name: leaderboard-evaluation
      rag-templates-optimization:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-rag-templates-optimization
        dependentTasks:
        - search-space-preparation
        - test-data-loader
        - text-extraction
        inputs:
          artifacts:
            extracted_text:
              taskOutputArtifact:
                outputArtifactKey: extracted_text
                producerTask: text-extraction
            search_space_prep_report:
              taskOutputArtifact:
                outputArtifactKey: search_space_prep_report
                producerTask: search-space-preparation
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            input_test_data_key:
              componentInputParameter: input_data_key
            llama_stack_vector_database_id:
              componentInputParameter: llama_stack_vector_database_id
            optimization_settings:
              runtimeValue:
                constant:
                  max_number_of_rag_patterns: '{{$.inputs.parameters[''pipelinechannel--optimization_max_rag_patterns'']}}'
                  metric: '{{$.inputs.parameters[''pipelinechannel--optimization_metric'']}}'
            pipelinechannel--optimization_max_rag_patterns:
              componentInputParameter: optimization_max_rag_patterns
            pipelinechannel--optimization_metric:
              componentInputParameter: optimization_metric
            test_data_key:
              componentInputParameter: test_data_key
        taskInfo:
          name: rag-templates-optimization
      search-space-preparation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-search-space-preparation
        dependentTasks:
        - test-data-loader
        - text-extraction
        inputs:
          artifacts:
            extracted_text:
              taskOutputArtifact:
                outputArtifactKey: extracted_text
                producerTask: text-extraction
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: test-data-loader
          parameters:
            embeddings_models:
              componentInputParameter: embeddings_models
            generation_models:
              componentInputParameter: generation_models
        taskInfo:
          name: search-space-preparation
      test-data-loader:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-test-data-loader
        inputs:
          parameters:
            test_data_bucket_name:
              componentInputParameter: test_data_bucket_name
            test_data_path:
              componentInputParameter: test_data_key
        taskInfo:
          name: test-data-loader
      text-extraction:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-text-extraction
        dependentTasks:
        - documents-discovery
        inputs:
          artifacts:
            documents_descriptor:
              taskOutputArtifact:
                outputArtifactKey: discovered_documents
                producerTask: documents-discovery
        taskInfo:
          name: text-extraction
  inputDefinitions:
    parameters:
      embeddings_models:
        description: Optional list of embedding model identifiers to use in the search
          space.
        isOptional: true
        parameterType: LIST
      generation_models:
        description: 'Optional list of foundation/generation model identifiers to
          use in the

          search space.'
        isOptional: true
        parameterType: LIST
      input_data_bucket_name:
        description: S3 (or compatible) bucket name for the input documents.
        parameterType: STRING
      input_data_key:
        description: Object key (path) of the input documents in the input data bucket.
        parameterType: STRING
      input_data_secret_name:
        description: 'Name of the Kubernetes secret holding S3-compatible credentials

          for input document data access. The following environment variables are
          required:

          AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, AWS_DEFAULT_REGION.'
        parameterType: STRING
      llama_stack_secret_name:
        description: 'Name of the Kubernetes secret for llama-stack API connection.

          The secret must define: LLAMA_STACK_CLIENT_API_KEY, LLAMA_STACK_CLIENT_BASE_URL.'
        parameterType: STRING
      llama_stack_vector_database_id:
        description: 'Optional vector database id (e.g., registered in llama-stack
          Milvus).

          If not provided, an in-memory database may be used.'
        isOptional: true
        parameterType: STRING
      optimization_max_rag_patterns:
        defaultValue: 8.0
        description: 'Maximum number of RAG patterns to generate. Passed to ai4rag

          (max_number_of_rag_patterns). Defaults to 8.'
        isOptional: true
        parameterType: NUMBER_INTEGER
      optimization_metric:
        defaultValue: faithfulness
        description: 'Quality metric used to optimize RAG patterns. Supported values:

          "faithfulness", "answer_correctness", "context_correctness".'
        isOptional: true
        parameterType: STRING
      test_data_bucket_name:
        description: S3 (or compatible) bucket name for the test data file.
        parameterType: STRING
      test_data_key:
        description: Object key (path) of the test data JSON file in the test data
          bucket.
        parameterType: STRING
      test_data_secret_name:
        description: 'Name of the Kubernetes secret holding S3-compatible credentials
          for

          test data access. The following environment variables are required:

          AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, AWS_DEFAULT_REGION.'
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-documents-discovery:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: false
            secretNameParameter:
              componentInputParameter: input_data_secret_name
        exec-rag-templates-optimization:
          secretAsEnv:
          - keyToEnv:
            - envVar: LLAMA_STACK_CLIENT_BASE_URL
              secretKey: LLAMA_STACK_CLIENT_BASE_URL
            - envVar: LLAMA_STACK_CLIENT_API_KEY
              secretKey: LLAMA_STACK_CLIENT_API_KEY
            optional: false
            secretNameParameter:
              componentInputParameter: llama_stack_secret_name
        exec-search-space-preparation:
          secretAsEnv:
          - keyToEnv:
            - envVar: LLAMA_STACK_CLIENT_BASE_URL
              secretKey: LLAMA_STACK_CLIENT_BASE_URL
            - envVar: LLAMA_STACK_CLIENT_API_KEY
              secretKey: LLAMA_STACK_CLIENT_API_KEY
            optional: false
            secretNameParameter:
              componentInputParameter: llama_stack_secret_name
        exec-test-data-loader:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: false
            secretNameParameter:
              componentInputParameter: test_data_secret_name
        exec-text-extraction:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_S3_ENDPOINT
              secretKey: AWS_S3_ENDPOINT
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: false
            secretNameParameter:
              componentInputParameter: input_data_secret_name
