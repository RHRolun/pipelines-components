          \  \"- **Context Template**: How retrieved context is incorporated into\
          \ prompts\\n\",\n                \"\\n\",\n                \"These templates\
          \ control how the RAG system structures prompts to the language model.\"\
          ,\n            ],\n        ),\n        \"FOUNDATION_MODEL\": NotebookCell(\n\
          \            cell_type=\"code\",\n            source=[\n               \
          \ \"from ai4rag.rag.foundation_models.llama_stack import LSFoundationModel\\\
          n\",\n                \"\\n\",\n                'chat_model_id = \"\"\"\
          {FM_MODEL_ID}\"\"\"\\n',\n                'system_message_text = \"\"\"\
          {SYSTEM_MESSAGE}\"\"\"\\n',\n                'user_message_text = \"\"\"\
          {USER_MESSAGE}\"\"\"\\n',\n                'context_template_text = \"\"\
          \"{CONTEXT_TEXT}\"\"\"\\n',\n                \"\\n\",\n                \"\
          lsfoundationmodel = LSFoundationModel(\\n\",\n                \"    client=client,\\\
          n\",\n                \"    model_id=chat_model_id,\\n\",\n            \
          \    \"    system_message_text=system_message_text,\\n\",\n            \
          \    \"    user_message_text=user_message_text,\\n\",\n                \"\
          \    context_template_text=context_template_text,\\n\",\n              \
          \  \")\",\n            ],\n        ),\n        \"MD_3_2\": NotebookCell(\n\
          \            cell_type=\"markdown\",\n            source=[\n           \
          \     \"### Initialize Vector Store Client\\n\",\n                \"\\n\"\
          ,\n                \"The vector store is responsible for storing and retrieving\
          \ document embeddings. This section sets up:\\n\",\n                \"-\
          \ **Embedding Model**: Converts text into vector representations for semantic\
          \ search\\n\",\n                \"- **Vector Database**: Stores embeddings\
          \ with configurable distance metrics (cosine, euclidean, etc.)\\n\",\n \
          \               \"- **Collection**: A named collection where document vectors\
          \ are stored and can be reused\\n\",\n                \"\\n\",\n       \
          \         \"The vector store enables semantic similarity search to find\
          \ relevant context for user queries.\",\n            ],\n        ),\n  \
          \      \"VECTOR_STORE\": NotebookCell(\n            cell_type=\"code\",\n\
          \            source=[\n                \"from ai4rag.rag.embedding.llama_stack\
          \ import LSEmbeddingModel, LSEmbeddingParams\\n\",\n                \"from\
