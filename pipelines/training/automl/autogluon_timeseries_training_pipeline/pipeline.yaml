pipelineInfo:
  description: End-to-end AutoGluon time series forecasting pipeline. Loads time series
    data from S3 in TimeSeriesDataFrame format (item_id, timestamp, target), trains
    multiple AutoGluon TimeSeries models (local statistical and global deep learning),
    ranks them by the chosen eval metric, and produces a leaderboard and the top N
    trained predictors for deployment. Supports optional known covariates and configurable
    prediction_length.
  name: autogluon-timeseries-training-pipeline
root:
  dag:
    tasks:
      for-loop-1:
        componentRef:
          name: comp-for-loop-1
        dependentTasks:
        - timeseries-data-loader
        - timeseries-models-selection
        inputs:
          artifacts:
            pipelinechannel--timeseries-data-loader-sampled_test_dataset:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: timeseries-data-loader
          parameters:
            pipelinechannel--timeseries-data-loader-extra_train_data_path:
              taskOutputParameter:
                outputParameterKey: extra_train_data_path
                producerTask: timeseries-data-loader
            pipelinechannel--timeseries-data-loader-sample_config:
              taskOutputParameter:
                outputParameterKey: sample_config
                producerTask: timeseries-data-loader
            pipelinechannel--timeseries-data-loader-split_config:
              taskOutputParameter:
                outputParameterKey: split_config
                producerTask: timeseries-data-loader
            pipelinechannel--timeseries-models-selection-model_config:
              taskOutputParameter:
                outputParameterKey: model_config
                producerTask: timeseries-models-selection
            pipelinechannel--timeseries-models-selection-predictor_path:
              taskOutputParameter:
                outputParameterKey: predictor_path
                producerTask: timeseries-models-selection
            pipelinechannel--timeseries-models-selection-top_models:
              taskOutputParameter:
                outputParameterKey: top_models
                producerTask: timeseries-models-selection
        iteratorPolicy:
          parallelismLimit: 2
        parameterIterator:
          itemInput: pipelinechannel--timeseries-models-selection-top_models-loop-item
          items:
            inputParameter: pipelinechannel--timeseries-models-selection-top_models
        taskInfo:
          name: for-loop-1
      leaderboard-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-leaderboard-evaluation
        dependentTasks:
        - for-loop-1
        - timeseries-models-selection
        inputs:
          artifacts:
            models:
              taskOutputArtifact:
                outputArtifactKey: pipelinechannel--timeseries-models-full-refit-model_artifact
                producerTask: for-loop-1
          parameters:
            eval_metric:
              taskOutputParameter:
                outputParameterKey: eval_metric_name
                producerTask: timeseries-models-selection
        taskInfo:
          name: leaderboard-evaluation
      timeseries-data-loader:
        cachingOptions: {}
        componentRef:
          name: comp-timeseries-data-loader
        inputs:
          parameters:
            bucket_name:
              componentInputParameter: train_data_bucket_name
            file_key:
              componentInputParameter: train_data_file_key
            id_column:
              componentInputParameter: id_column
            target:
              componentInputParameter: target
            timestamp_column:
              componentInputParameter: timestamp_column
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: timeseries-data-loader
      timeseries-models-selection:
        cachingOptions: {}
        componentRef:
          name: comp-timeseries-models-selection
        dependentTasks:
        - timeseries-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: timeseries-data-loader
          parameters:
            id_column:
              componentInputParameter: id_column
            known_covariates_names:
              componentInputParameter: known_covariates_names
            prediction_length:
              componentInputParameter: prediction_length
            target:
              componentInputParameter: target
            timestamp_column:
              componentInputParameter: timestamp_column
            top_n:
              componentInputParameter: top_n
            train_data_path:
              taskOutputParameter:
                outputParameterKey: models_selection_train_data_path
                producerTask: timeseries-data-loader
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: timeseries-models-selection
  inputDefinitions:
    parameters:
      id_column:
        parameterType: STRING
      known_covariates_names:
        isOptional: true
        parameterType: LIST
      prediction_length:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      target:
        parameterType: STRING
      timestamp_column:
        parameterType: STRING
      top_n:
        defaultValue: 3.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      train_data_bucket_name:
        parameterType: STRING
      train_data_file_key:
        parameterType: STRING
      train_data_secret_name:
        parameterType: STRING
