                            ],
                        },
                        {
                            "cell_type": "code",
                            "execution_count": None,
                            "id": "9be1f501-02e4-4107-906b-8f19448768bd",
                            "metadata": {},
                            "outputs": [],
                            "source": [
                                "import boto3\n",
                                "import os\n",
                                "from IPython.display import HTML\n",
                                "\n",
                                "s3 = boto3.resource('s3', endpoint_url=os.environ['AWS_S3_ENDPOINT'])\n",
