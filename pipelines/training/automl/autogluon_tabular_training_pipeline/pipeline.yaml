          \        eval_metric: Metric name for ranking (e.g. \"accuracy\", \"root_mean_squared_error\"\
          ); leaderboard sorted by it descending.\n        html_artifact: Output artifact\
          \ for the HTML-formatted leaderboard (model names and metrics).\n\n    Raises:\n\
          \        FileNotFoundError: If any model metrics path cannot be found.\n\
          \        KeyError: If metadata lacks \"display_name\" or metrics JSON lacks\
          \ the eval_metric key.\n\n    Example:\n        from kfp import dsl\n  \
          \      from components.training.automl.autogluon_leaderboard_evaluation\
          \ import (\n            leaderboard_evaluation\n        )\n\n        @dsl.pipeline(name=\"\
          model-evaluation-pipeline\")\n        def evaluation_pipeline(trained_models):\n\
          \            leaderboard = leaderboard_evaluation(\n                models=trained_models,\n\
          \                eval_metric=\"root_mean_squared_error\",\n            )\n\
          \            return leaderboard\n    \"\"\"  # noqa: E501\n    import html\
          \ as html_module\n    import json\n    from pathlib import Path\n\n    import\
          \ pandas as pd\n\n    def _build_leaderboard_table(df: pd.DataFrame) ->\
          \ str:\n        \"\"\"Build table HTML with Notebook and Predictor as separate\
          \ columns (raw URI as link text).\"\"\"\n        display_cols = [c for c\
          \ in df.columns if c not in (\"notebook\", \"predictor\")]\n        rows\
          \ = []\n        rows.append(\n            \"<thead><tr>\"\n            +\
          \ \"\".join(f\"<th>{html_module.escape(str(c))}</th>\" for c in [df.index.name\
          \ or \"rank\"] + display_cols)\n            + \"<th>Notebook</th><th>Predictor</th></tr></thead><tbody>\"\
          \n        )\n        for idx, row in df.iterrows():\n            cells =\
          \ [f\"<td>{html_module.escape(str(idx))}</td>\"]\n            for col in\
          \ display_cols:\n                val = row[col]\n                cells.append(f\"\
          <td>{html_module.escape(str(val))}</td>\")\n            notebook_uri = html_module.escape(str(row[\"\
          notebook\"]))\n            predictor_uri = html_module.escape(str(row[\"\
          predictor\"]))\n            cells.append(\n                f'<td class=\"\
          uri-cell\">'\n                f'<a href=\"{notebook_uri}\" class=\"uri-link\"\
          \ data-uri=\"{notebook_uri}\" target=\"_blank\" rel=\"noopener\">URI</a>'\
          \  # noqa: E501\n                f'<div class=\"uri-popover\" role=\"dialog\"\
          \ aria-label=\"URI\" hidden>'\n                f'<pre class=\"uri-popover-text\"\
          ></pre>'\n                f'<button type=\"button\" class=\"uri-popover-close\"\
          \ aria-label=\"Close\">\xD7</button>'\n                f\"</div></td>\"\n\
          \            )\n            cells.append(\n                f'<td class=\"\
          uri-cell\">'\n                f'<a href=\"{predictor_uri}\" class=\"uri-link\"\
          \ data-uri=\"{predictor_uri}\" target=\"_blank\" rel=\"noopener\">URI</a>'\
          \  # noqa: E501\n                f'<div class=\"uri-popover\" role=\"dialog\"\
          \ aria-label=\"URI\" hidden>'\n                f'<pre class=\"uri-popover-text\"\
          ></pre>'\n                f'<button type=\"button\" class=\"uri-popover-close\"\
          \ aria-label=\"Close\">\xD7</button>'\n                f\"</div></td>\"\n\
          \            )\n            rows.append(\"<tr>\" + \"\".join(cells) + \"\
          </tr>\")\n        return \"<table>\" + \"\".join(rows) + \"</tbody></table>\"\
          \n\n    # Modified theme colors for a lighter look. Only :root CSS vars\
          \ are changed.\n    def _build_leaderboard_html(table_html: str, eval_metric:\
          \ str, best_model_name: str, num_models: int) -> str:\n        \"\"\"Build\
          \ a styled HTML document for the leaderboard (lighter theme).\"\"\"\n  \
          \      return f\"\"\"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta\
          \ charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width,\
