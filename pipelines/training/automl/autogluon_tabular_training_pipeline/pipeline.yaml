# yamllint disable rule:line-length
---
components:
  comp-autogluon-models-full-refit:
    executorLabel: exec-autogluon-models-full-refit
    inputDefinitions:
      artifacts:
        test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: |-
            Dataset artifact (CSV) with the complete training data.
            Used for evaluation and for writing metrics; the dataset format
            should match the data used during initial training.
      parameters:
        model_config:
          description: |-
            Configuration dictionary for model training (stored
            in artifact metadata).
          parameterType: STRUCT
        model_name:
          description: |-
            The name of the model to refit. Must match a model name
            in the predictor. The refitted model is saved with the suffix
            "_FULL" appended to this name.
          parameterType: STRING
        pipeline_name:
          description: |-
            Name of the pipeline run. The last hyphen-separated
            segment is stripped for use in the generated notebook.
          parameterType: STRING
        predictor_path:
          description: |-
            Path to a trained AutoGluon TabularPredictor that
            includes the model specified by model_name.
          parameterType: STRING
        run_id:
          description: ID of the pipeline run (used in the generated notebook).
          parameterType: STRING
        sample_row:
          description: |-
            JSON string of a list of row objects (e.g.
            '[{"feature1": 1, "target": 0}]'). Used as example input in the
            generated notebook; the label column is removed from each row.
          parameterType: STRING
        sampling_config:
          description: |-
            Configuration dictionary for data sampling (stored
            in artifact metadata).
          parameterType: STRUCT
        split_config:
          description: |-
            Configuration dictionary for data splitting (stored
            in artifact metadata).
          parameterType: STRUCT
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        model_name:
          parameterType: STRING
  comp-automl-data-loader:
    executorLabel: exec-automl-data-loader
    inputDefinitions:
      parameters:
        bucket_name:
          description: Name of the S3 bucket containing the file.
          parameterType: STRING
        file_key:
          description: Location of the CSV file in the S3 bucket.
          parameterType: STRING
        label_column:
          description: Name of the column containing labels/target values for stratified
            sampling.
          isOptional: true
          parameterType: STRING
        sampling_method:
          description: >-
            Type of sampling strategy. Options: "first_n_rows", "stratified",
            or "random".

            If None (default), derived from task_type: "stratified" for binary/multiclass, "random" for regression.
          isOptional: true
          parameterType: STRING
        task_type:
          defaultValue: regression
          description: >-
            The type of machine learning task. Supported values: "binary",
            "multiclass", or "regression"

            (default). Used when sampling_method is None to choose the sampling strategy.
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      artifacts:
        full_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        sample_config:
          parameterType: STRUCT
  comp-for-loop-1:
    dag:
      outputs:
        artifacts:
          pipelinechannel--autogluon-models-full-refit-model_artifact:
            artifactSelectors:
              - outputArtifactKey: model_artifact
                producerSubtask: autogluon-models-full-refit
      tasks:
        autogluon-models-full-refit:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-autogluon-models-full-refit
          inputs:
            artifacts:
              test_dataset:
                componentInputArtifact: pipelinechannel--tabular-train-test-split-sampled_test_dataset
            parameters:
              model_config:
                componentInputParameter: pipelinechannel--models-selection-model_config
              model_name:
                componentInputParameter: pipelinechannel--models-selection-top_models-loop-item
              pipeline_name:
                runtimeValue:
                  constant: "{{$.pipeline_job_resource_name}}"
              predictor_path:
                componentInputParameter: pipelinechannel--models-selection-predictor_path
              run_id:
                runtimeValue:
                  constant: "{{$.pipeline_job_uuid}}"
              sample_row:
                componentInputParameter: pipelinechannel--tabular-train-test-split-sample_row
              sampling_config:
                componentInputParameter: pipelinechannel--automl-data-loader-sample_config
              split_config:
                componentInputParameter: pipelinechannel--tabular-train-test-split-split_config
          taskInfo:
            name: autogluon-models-full-refit
    inputDefinitions:
      artifacts:
        pipelinechannel--tabular-train-test-split-sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--automl-data-loader-sample_config:
          parameterType: STRUCT
        pipelinechannel--models-selection-model_config:
          parameterType: STRUCT
        pipelinechannel--models-selection-predictor_path:
          parameterType: STRING
        pipelinechannel--models-selection-top_models:
          parameterType: LIST
        pipelinechannel--models-selection-top_models-loop-item:
          parameterType: STRING
        pipelinechannel--tabular-train-test-split-sample_row:
          parameterType: STRING
        pipelinechannel--tabular-train-test-split-split_config:
          parameterType: STRUCT
    outputDefinitions:
      artifacts:
        pipelinechannel--autogluon-models-full-refit-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          isArtifactList: true
  comp-leaderboard-evaluation:
    executorLabel: exec-leaderboard-evaluation
    inputDefinitions:
      artifacts:
        models:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          description: |-
            A list of Model artifacts. Each should have metadata containing
            a "display_name" field and metrics file at
            model.path / model_name / metrics / metrics.json.
          isArtifactList: true
      parameters:
        eval_metric:
          description: |-
            The name of the evaluation metric to use for ranking.
            Must match a key in the metrics JSON (e.g., "accuracy" for
            classification, "root_mean_squared_error" for regression).
            The leaderboard is sorted by this metric in descending order.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        html_artifact:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
      parameters:
        best_model:
          parameterType: STRING
  comp-models-selection:
    executorLabel: exec-models-selection
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: |-
            A Dataset artifact containing the test data in
            CSV format. This data is used to evaluate model performance and
            generate the leaderboard. The dataset should match the schema of
            the training data.
        train_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: |-
            A Dataset artifact containing the training data
            in CSV format. This data is used to train the AutoGluon models.
            The dataset should include the label_column and all feature columns.
      parameters:
        label_column:
          description: >-
            The name of the target/label column in the training

            and test datasets. This column will be used as the prediction target.
          parameterType: STRING
        task_type:
          description: >-
            The type of machine learning task. Supported values

            include "binary", "multiclass" (classification) or "regression". This

            determines the evaluation metrics and model types AutoGluon will use.
          parameterType: STRING
        top_n:
          description: >-
            The number of top-performing models to select from the leaderboard.

            Only the top N models will be returned and promoted to the refit stage.

            Must be a positive integer.
          parameterType: NUMBER_INTEGER
        workspace_path:
          description: |-
            Path (string) to the workspace directory where the
            trained TabularPredictor will be saved (under workspace_path /
            autogluon_predictor). This path is also returned as predictor_path
            for use by downstream components.
          parameterType: STRING
    outputDefinitions:
      parameters:
        eval_metric:
          parameterType: STRING
        model_config:
          parameterType: STRUCT
        predictor_path:
          parameterType: STRING
        top_models:
          parameterType: LIST
  comp-tabular-train-test-split:
    executorLabel: exec-tabular-train-test-split
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Input CSV dataset to split.
      parameters:
        label_column:
          description: Name of the label/target column.
          parameterType: STRING
        split_config:
          description: 'Split configuration dictionary. Available keys: "test_size"
            (float), "random_state" (int), "stratify" (bool).'
          parameterType: STRUCT
        task_type:
          description: 'Machine learning task type: "binary", "multiclass", or
            "regression".'
          parameterType: STRING
    outputDefinitions:
      artifacts:
        sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        sampled_train_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        sample_row:
          parameterType: STRING
        split_config:
          parameterType: STRUCT
deploymentSpec:
  executors:
    exec-autogluon-models-full-refit:
      container:
        args:
          - --executor_input
          - "{{$}}"
          - --function_to_execute
          - autogluon_models_full_refit
        command:
          - sh
          - -c
          - >

            if ! [ -x "$(command -v pip)" ]; then
                python3 -m ensurepip || python3 -m ensurepip --user || apt-get install python3-pip
            fi


            PIP_DISABLE_PIP_VERSION_CHECK=1 python3 -m pip install --quiet --no-warn-script-location 'autogluon.tabular==1.5.0' 'catboost==1.2.8' 'fastai==2.8.5' 'lightgbm==4.6.0' 'torch==2.9.1' 'xgboost==3.1.3'  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<"3.9"' && "$0" "$@"
          - sh
          - -ec
          - >
            program_path=$(mktemp -d)


            printf "%s" "$0" > "$program_path/ephemeral_component.py"

            _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"
          - >+

            import kfp

            from kfp import dsl

            from kfp.dsl import *

            from typing import *


            def autogluon_models_full_refit(
                model_name: str,
                test_dataset: dsl.Input[dsl.Dataset],
                predictor_path: str,
                sampling_config: dict,
                split_config: dict,
                model_config: dict,
                pipeline_name: str,
                run_id: str,
                sample_row: str,
                model_artifact: dsl.Output[dsl.Model],
            ) -> NamedTuple("outputs", model_name=str):
                """Refit a specific AutoGluon model on the full training dataset.

                This component takes a trained AutoGluon TabularPredictor, loaded from
                predictor_path, and refits a specific model, identified by model_name, on
                the full training data. By default AutoGluon refit_full uses the
                predictor's training and validation data; the test_dataset is used for
                evaluation and for writing metrics. The refitted model is saved with the
                suffix "_FULL" appended to model_name.

                The component clones the predictor to model_artifact.path / model_name_FULL
                / predictor, keeps only the specified model and its refitted version,
                sets the refitted model as best, and saves space by removing other models.
                Evaluation metrics, feature importance, and (for classification) confusion
                matrix are written under model_artifact.path / model_name_FULL / metrics.
                A Jupyter notebook (automl_predictor_notebook.ipynb) is written under
                model_artifact.path / model_name_FULL / notebooks for inference and
                exploration; pipeline_name, run_id, and sample_row are used to fill in
                run context and example input (the label column is stripped from sample_row
                in the notebook). Artifact metadata includes display_name, context
                (data_config, task_type, label_column, model_config, location, metrics),
                and context.location.notebook. Supported problem types are regression,
                binary, and multiclass; any other type raises ValueError.

                This component is typically used in a two-stage training pipeline where
                models are first trained on sampled data for exploration, then the best
                candidates are refitted on the full dataset for optimal performance.

                Args:
                    model_name: The name of the model to refit. Must match a model name
                        in the predictor. The refitted model is saved with the suffix
                        "_FULL" appended to this name.
                    test_dataset: Dataset artifact (CSV) with the complete training data.
                        Used for evaluation and for writing metrics; the dataset format
                        should match the data used during initial training.
                    predictor_path: Path to a trained AutoGluon TabularPredictor that
                        includes the model specified by model_name.
                    sampling_config: Configuration dictionary for data sampling (stored
                        in artifact metadata).
                    split_config: Configuration dictionary for data splitting (stored
                        in artifact metadata).
                    model_config: Configuration dictionary for model training (stored
                        in artifact metadata).
                    pipeline_name: Name of the pipeline run. The last hyphen-separated
                        segment is stripped for use in the generated notebook.
                    run_id: ID of the pipeline run (used in the generated notebook).
                    sample_row: JSON string of a list of row objects (e.g.
                        '[{"feature1": 1, "target": 0}]'). Used as example input in the
                        generated notebook; the label column is removed from each row.
                    model_artifact: Output Model artifact. The refitted predictor is
                        saved under model_artifact.path / model_name_FULL / predictor;
                        metrics under model_artifact.path / model_name_FULL / metrics;
                        notebook under model_artifact.path / model_name_FULL / notebooks.

                Returns:
                    NamedTuple with field model_name: the refitted model name (model_name
                    with "_FULL" suffix). The refitted predictor and artifacts are also
                    written to model_artifact.

                Raises:
                    FileNotFoundError: If the predictor path or test_dataset path
                        cannot be found.
                    ValueError: If the predictor cannot be loaded, model_name is not
                        found in the predictor, refit fails, or problem_type is not
                        regression, binary, or multiclass.
                    KeyError: If required model files are missing from the predictor.

                Example:
                    from kfp import dsl
                    from components.training.automl.autogluon_models_full_refit import (
                        autogluon_models_full_refit,
                    )

                    @dsl.pipeline(name="model-refit-pipeline")
                    def refit_pipeline(test_data, predictor_path, pipeline_name, run_id):
                        refitted = autogluon_models_full_refit(
                            model_name="LightGBM_BAG_L1",
                            test_dataset=test_data,
                            predictor_path=predictor_path,
                            sampling_config={},
                            split_config={},
                            model_config={},
                            pipeline_name=pipeline_name,
                            run_id=run_id,
                            sample_row='[{"feature1": 1, "target": 1.0}]',
                            model_artifact=dsl.Output(type="Model"),
                        )
                        return refitted.model_name

                """
                import json
                import os
                from pathlib import Path

                import pandas as pd
                from autogluon.tabular import TabularPredictor

                test_dataset_df = pd.read_csv(test_dataset.path)

                predictor = TabularPredictor.load(predictor_path)

                # save refitted model to output artifact
                model_name_full = model_name + "_FULL"
                output_path = Path(model_artifact.path) / model_name_full

                # set the name of the model artifact and its metadata
                model_artifact.metadata["display_name"] = model_name_full
                model_artifact.metadata["context"] = {}
                model_artifact.metadata["context"]["data_config"] = {
                    "sampling_config": sampling_config,
                    "split_config": split_config,
                }

                model_artifact.metadata["context"]["task_type"] = predictor.problem_type
                model_artifact.metadata["context"]["label_column"] = predictor.label

                model_artifact.metadata["context"]["model_config"] = model_config
                model_artifact.metadata["context"]["location"] = {
                    "model_directory": f"{model_name_full}",
                    "predictor": f"{model_name_full}/predictor/predictor.pkl",
                }

                # clone the predictor to the output artifact path and delete unnecessary models
                predictor_clone = predictor.clone(path=output_path / "predictor", return_clone=True, dirs_exist_ok=True)
                predictor_clone.delete_models(models_to_keep=[model_name])

                # by default, autogluon refit on traing + validation data
                predictor_clone.refit_full(model=model_name)

                predictor_clone.set_model_best(model=model_name_full, save_trainer=True)
                predictor_clone.save_space()

                eval_results = predictor_clone.evaluate(test_dataset_df)
                model_artifact.metadata["context"]["metrics"] = {"test_data": eval_results}
                feature_importance = predictor_clone.feature_importance(test_dataset_df)

                # save evaluation results to output artifact
                os.makedirs(str(output_path / "metrics"), exist_ok=True)
                with (output_path / "metrics" / "metrics.json").open("w") as f:
                    json.dump(eval_results, f)

                # save feature importance to output artifact
                with (output_path / "metrics" / "feature_importance.json").open("w") as f:
                    json.dump(feature_importance.to_dict(), f)

                # generate confusion matrix for classification problem types
                if predictor.problem_type in {"binary", "multiclass"}:
                    from autogluon.core.metrics import confusion_matrix

                    confusion_matrix_res = confusion_matrix(
                        solution=predictor_clone.predict(test_dataset_df),
                        prediction=test_dataset_df[predictor.label],
                        output_format="pandas_dataframe",
                    )
                    with (output_path / "metrics" / "confusion_matrix.json").open("w") as f:
                        json.dump(confusion_matrix_res.to_dict(), f)

                # Notebook generation

                # TODO: Move to build package in next stages

                REGRESSION = {
                    "cells": [
                        {
                            "cell_type": "markdown",
                            "id": "a12d957a-c313-4e92-9578-44f6a48560d5",
                            "metadata": {},
                            "source": [
                                "![AutoML Banner](data:image/svg+xml;base64,)"  # noqa: E501
                            ],
                        },
                        {
                            "cell_type": "markdown",
                            "id": "0e9aa72f",
                            "metadata": {},
                            "source": [
                                "## Notebook content\n",
                                "\n",
                                "This notebook lets you review the experiment leaderboard for insights into trained model evaluation quality, load a chosen AutoGluon model from S3, and run predictions. \n",  # noqa: E501
                                "\n",
                                "\n",
                                " \U0001f4a1 **Tips:**\n",
                                "- Ensure the S3 connection to pipeline run results is configured so the notebook can access run artifacts.\n",  # noqa: E501
                                "- The model name must match one of the models listed in the leaderboard (the **model** column).\n",
                                "\n",
                                "### Contents\n",
                                "This notebook contains the following parts:\n",
                                "\n",
                                "**[Setup](#setup)**  \n",
                                "**[Experiment run details](#experiment-run-details)**  \n",
                                "**[Experiment leaderboard](#experiment-leaderboard)**  \n",
                                "**[Download trained model](#download-trained-model)**  \n",
                                "**[Model insights](#model-insights)**  \n",
                                "**[Load the predictor](#load-the-predictor)**  \n",
                                "**[Predict the values](#predict-the-values)**  \n",
                                "**[Summary and next steps](#summary-and-next-steps)**",
                            ],
                        },
                        {
                            "cell_type": "markdown",
                            "id": "a7d9cf2b-18cc-4ac9-87af-a74f8bf60322",
                            "metadata": {},
                            "source": ['<a id="setup"></a>\n', "## Setup"],
                        },
                        {
                            "cell_type": "code",
                            "execution_count": None,
                            "id": "5bacd972",
