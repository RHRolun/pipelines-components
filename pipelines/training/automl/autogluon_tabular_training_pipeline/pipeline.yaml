---
# PIPELINE DEFINITION
# Name: autogluon-tabular-training-pipeline
# Description: End-to-end AutoGluon tabular training pipeline implementing a two-stage approach: first builds and selects top-performing models on sampled data, then refits them on the full dataset. The pipeline loads data from S3, splits it into train/test sets, trains multiple AutoGluon models using ensembling (stacking and bagging), selects the top N performers, refits each on the complete training data in parallel, and finally evaluates all refitted models to generate a comprehensive leaderboard with performance metrics.
# Inputs:
#    label_column: str
#    task_type: str
#    top_n: int [Default: 3.0]
#    train_data_bucket_name: str
#    train_data_file_key: str
#    train_data_secret_name: str
components:
  comp-autogluon-models-full-refit:
    executorLabel: exec-autogluon-models-full-refit
    inputDefinitions:
      artifacts:
        test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Dataset artifact (CSV) for evaluation and metrics; format should
            match initial training data.
      parameters:
        extra_train_data_path:
          defaultValue: ''
          description: Optional path to extra training data CSV (on PVC workspace)
            passed to refit_full.
          isOptional: true
          parameterType: STRING
        model_config:
          description: Model training config (stored in artifact metadata).
          isOptional: true
          parameterType: STRUCT
        model_name:
          description: Name of the model to refit (must exist in predictor); refitted
            model saved with "_FULL" suffix.
          parameterType: STRING
        pipeline_name:
          description: Pipeline run name; last hyphen-separated segment used in the
            generated notebook.
          parameterType: STRING
        predictor_path:
          description: Path to the trained TabularPredictor containing model_name.
          parameterType: STRING
        run_id:
          description: Pipeline run ID (used in the generated notebook).
          parameterType: STRING
        sample_row:
          description: JSON list of row objects for example input in the notebook;
            label column is stripped.
          parameterType: STRING
        sampling_config:
          description: Data sampling config (stored in artifact metadata).
          isOptional: true
          parameterType: STRUCT
        split_config:
          description: Data split config (stored in artifact metadata).
          isOptional: true
          parameterType: STRUCT
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        model_name:
          parameterType: STRING
  comp-automl-data-loader:
    executorLabel: exec-automl-data-loader
    inputDefinitions:
      parameters:
        bucket_name:
          description: S3 bucket name containing the file.
          parameterType: STRING
        file_key:
          description: S3 object key of the CSV file.
          parameterType: STRING
        label_column:
          description: Name of the label/target column in the dataset.
          parameterType: STRING
        sampling_method:
          description: '"first_n_rows", "stratified", or "random"; if None, derived
            from task_type.'
          isOptional: true
          parameterType: STRING
        selection_train_size:
          defaultValue: 0.3
          description: Fraction of the train portion used for model selection (default
            0.3).
          isOptional: true
          parameterType: NUMBER_DOUBLE
        split_config:
          description: 'Split configuration dictionary. Available keys: "test_size"
            (float), "random_state" (int), "stratify" (bool).'
          isOptional: true
          parameterType: STRUCT
        task_type:
          defaultValue: regression
          description: '"binary", "multiclass", or "regression" (default); used when
            sampling_method is None.'
          isOptional: true
          parameterType: STRING
        workspace_path:
          description: PVC workspace directory where train CSVs will be written.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        extra_train_data_path:
          parameterType: STRING
        models_selection_train_data_path:
          parameterType: STRING
        sample_config:
          parameterType: STRUCT
        sample_row:
          parameterType: STRING
        split_config:
          parameterType: STRUCT
  comp-for-loop-1:
    dag:
      outputs:
        artifacts:
          pipelinechannel--autogluon-models-full-refit-model_artifact:
            artifactSelectors:
              - outputArtifactKey: model_artifact
                producerSubtask: autogluon-models-full-refit
      tasks:
        autogluon-models-full-refit:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-autogluon-models-full-refit
          inputs:
            artifacts:
              test_dataset:
                componentInputArtifact: pipelinechannel--automl-data-loader-sampled_test_dataset
            parameters:
              extra_train_data_path:
                componentInputParameter: pipelinechannel--automl-data-loader-extra_train_data_path
              model_config:
                componentInputParameter: pipelinechannel--models-selection-model_config
              model_name:
                componentInputParameter: pipelinechannel--models-selection-top_models-loop-item
              pipeline_name:
                runtimeValue:
                  constant: '{{$.pipeline_job_resource_name}}'
              predictor_path:
                componentInputParameter: pipelinechannel--models-selection-predictor_path
              run_id:
                runtimeValue:
                  constant: '{{$.pipeline_job_uuid}}'
              sample_row:
                componentInputParameter: pipelinechannel--automl-data-loader-sample_row
              sampling_config:
                componentInputParameter: pipelinechannel--automl-data-loader-sample_config
              split_config:
                componentInputParameter: pipelinechannel--automl-data-loader-split_config
          taskInfo:
            name: autogluon-models-full-refit
    inputDefinitions:
      artifacts:
        pipelinechannel--automl-data-loader-sampled_test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--automl-data-loader-extra_train_data_path:
          parameterType: STRING
        pipelinechannel--automl-data-loader-sample_config:
          parameterType: STRUCT
        pipelinechannel--automl-data-loader-sample_row:
          parameterType: STRING
        pipelinechannel--automl-data-loader-split_config:
          parameterType: STRUCT
        pipelinechannel--models-selection-model_config:
          parameterType: STRUCT
        pipelinechannel--models-selection-predictor_path:
          parameterType: STRING
        pipelinechannel--models-selection-top_models:
          parameterType: LIST
        pipelinechannel--models-selection-top_models-loop-item:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        pipelinechannel--autogluon-models-full-refit-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          isArtifactList: true
  comp-leaderboard-evaluation:
    executorLabel: exec-leaderboard-evaluation
    inputDefinitions:
      artifacts:
        models:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
          description: List of Model artifacts with "display_name" in metadata and
            metrics at model.path/model_name/metrics/metrics.json.
          isArtifactList: true
      parameters:
        eval_metric:
          description: Metric name for ranking (e.g. "accuracy", "root_mean_squared_error");
            leaderboard sorted by it descending.
          parameterType: STRING
    outputDefinitions:
      artifacts:
        html_artifact:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
      parameters:
        best_model:
          parameterType: STRING
  comp-models-selection:
    executorLabel: exec-models-selection
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Dataset artifact (CSV) for evaluation and leaderboard; schema
            must match train_data.
      parameters:
        label_column:
          description: Name of the target/label column in train and test datasets.
          parameterType: STRING
        task_type:
          description: 'ML task type: "binary", "multiclass", or "regression"; drives
            metrics and model types.'
          parameterType: STRING
        top_n:
          description: Number of top-performing models to select from the leaderboard
            (positive integer).
          parameterType: NUMBER_INTEGER
        train_data_path:
          description: Path to the training data CSV (on PVC workspace); must include
            label_column and features.
          parameterType: STRING
        workspace_path:
          description: Workspace directory where TabularPredictor is saved (workspace_path/autogluon_predictor).
          parameterType: STRING
    outputDefinitions:
      parameters:
        eval_metric:
          parameterType: STRING
        model_config:
          parameterType: STRUCT
        predictor_path:
          parameterType: STRING
        top_models:
          parameterType: LIST
deploymentSpec:
  executors:
    exec-autogluon-models-full-refit:
      container:
        args:
          - --executor_input
          - '{{$}}'
          - --function_to_execute
          - autogluon_models_full_refit
        command:
          - sh
          - -c
          - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'autogluon.tabular==1.5.0'\
          \ 'catboost==1.2.8' 'fastai==2.8.5' 'lightgbm==4.6.0' 'torch==2.9.1' 'xgboost==3.1.3'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
          - sh
          - -ec
          - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
          - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\n__KFP_EMBEDDED_ARCHIVE_B64 = ''\n\
          \nimport base64 as __kfp_b64\nimport io as __kfp_io\nimport os as __kfp_os\n\
          import sys as __kfp_sys\nimport tarfile as __kfp_tarfile\nimport tempfile\
          \ as __kfp_tempfile\n\n# Extract embedded archive at import time to ensure\
          \ sys.path and globals are set\n__kfp_tmpdir = __kfp_tempfile.TemporaryDirectory()\n\
          __KFP_EMBEDDED_ASSET_DIR = __kfp_tmpdir.name\ntry:\n    __kfp_bytes = __kfp_b64.b64decode(__KFP_EMBEDDED_ARCHIVE_B64.encode('ascii'))\n\
          \    with __kfp_tarfile.open(fileobj=__kfp_io.BytesIO(__kfp_bytes), mode='r:gz')\
          \ as __kfp_tar:\n        __kfp_tar.extractall(path=__KFP_EMBEDDED_ASSET_DIR)\n\
          except Exception as __kfp_e:\n    raise RuntimeError(f'Failed to extract\
          \ embedded archive: {__kfp_e}')\n\n# Always prepend the extracted directory\
          \ to sys.path for import resolution\nif __KFP_EMBEDDED_ASSET_DIR not in\
          \ __kfp_sys.path:\n    __kfp_sys.path.insert(0, __KFP_EMBEDDED_ASSET_DIR)\n\
          \n\n\n\ndef autogluon_models_full_refit(\n    model_name: str,\n    test_dataset:\
          \ dsl.Input[dsl.Dataset],\n    predictor_path: str,\n    pipeline_name:\
          \ str,\n    run_id: str,\n    sample_row: str,\n    model_artifact: dsl.Output[dsl.Model],\n\
          \    notebooks: dsl.EmbeddedInput[dsl.Dataset],\n    sampling_config: Optional[dict]\
          \ = None,\n    split_config: Optional[dict] = None,\n    model_config: Optional[dict]\
          \ = None,\n    extra_train_data_path: str = \"\",\n) -> NamedTuple(\"outputs\"\
          , model_name=str):\n    \"\"\"Refit a specific AutoGluon model on the full\
          \ training dataset.\n\n    This component takes a trained AutoGluon TabularPredictor,\
          \ loaded from\n    predictor_path, and refits a specific model, identified\
          \ by model_name, on\n    the full training data. When extra_train_data_path\
          \ is provided, the extra\n    training data is loaded and passed to refit_full\
          \ as train_data_extra. The\n    test_dataset is used for evaluation and\
          \ for writing metrics. The refitted\n    model is saved with the suffix\
          \ \"_FULL\" appended to model_name.\n\n    Artifacts are written under model_artifact.path\
          \ in a directory named\n    <model_name>_FULL (e.g. LightGBM_BAG_L1_FULL).\
          \ The layout is:\n\n      - model_artifact.path / <model_name>_FULL / predictor\
          \ /\n      TabularPredictor (predictor.pkl inside); clone with only the\
          \ refitted model.\n\n      - model_artifact.path / <model_name>_FULL / metrics\
          \ / metrics.json\n      (evaluation results; leaderboard component reads\
          \ this via display_name/metrics/metrics.json).\n\n      - model_artifact.path\
          \ / <model_name>_FULL / metrics / feature_importance.json\n\n      - model_artifact.path\
          \ / <model_name>_FULL / metrics / confusion_matrix.json\n      (classification\
          \ only).\n\n      - model_artifact.path / <model_name>_FULL / notebooks\
          \ / automl_predictor_notebook.ipynb\n\n    Artifact metadata: display_name\
          \ (<model_name>_FULL), context (data_config,\n    task_type, label_column,\
          \ model_config, location, metrics), and\n    context.location.notebook (path\
          \ to the notebook). Supported problem types:\n    regression, binary, multiclass;\
          \ any other raises ValueError.\n\n    This component is typically used in\
          \ a two-stage training pipeline where\n    models are first trained on sampled\
          \ data for exploration, then the best\n    candidates are refitted on the\
          \ full dataset for optimal performance.\n\n    Args:\n        model_name:\
          \ Name of the model to refit (must exist in predictor); refitted model saved\
          \ with \"_FULL\" suffix.\n        test_dataset: Dataset artifact (CSV) for\
          \ evaluation and metrics; format should match initial training data.\n \
          \       predictor_path: Path to the trained TabularPredictor containing\
          \ model_name.\n        sampling_config: Data sampling config (stored in\
          \ artifact metadata).\n        split_config: Data split config (stored in\
          \ artifact metadata).\n        model_config: Model training config (stored\
          \ in artifact metadata).\n        pipeline_name: Pipeline run name; last\
          \ hyphen-separated segment used in the generated notebook.\n        run_id:\
          \ Pipeline run ID (used in the generated notebook).\n        sample_row:\
          \ JSON list of row objects for example input in the notebook; label column\
          \ is stripped.\n        model_artifact: Output Model; artifacts under model_artifact.path/<model_name>_FULL\
          \ (predictor/, metrics/, notebooks/).\n        extra_train_data_path: Optional\
          \ path to extra training data CSV (on PVC workspace) passed to refit_full.\n\
          \        notebooks: Embedded notebook templates (injected by the runtime\
          \ from the component's embedded_artifact_path).\n\n    Returns:\n      \
          \  NamedTuple with model_name (refitted name with \"_FULL\" suffix); artifacts\
          \ written to model_artifact.\n\n    Raises:\n        FileNotFoundError:\
          \ If predictor path or test_dataset path cannot be found.\n        ValueError:\
          \ If predictor load fails, model_name not in predictor, refit fails, or\
          \ invalid problem_type.\n        KeyError: If required model files are missing\
          \ from the predictor.\n\n    Example:\n        from kfp import dsl\n   \
          \     from components.training.automl.autogluon_models_full_refit import\
          \ (\n            autogluon_models_full_refit,\n        )\n\n        @dsl.pipeline(name=\"\
          model-refit-pipeline\")\n        def refit_pipeline(test_data, predictor_path,\
          \ pipeline_name, run_id):\n            refitted = autogluon_models_full_refit(\n\
          \                model_name=\"LightGBM_BAG_L1\",\n                test_dataset=test_data,\n\
          \                predictor_path=predictor_path,\n                sampling_config={},\n\
          \                split_config={},\n                model_config={},\n  \
          \              pipeline_name=pipeline_name,\n                run_id=run_id,\n\
          \                sample_row='[{\"feature1\": 1, \"target\": 1.0}]',\n  \
          \              model_artifact=dsl.Output(type=\"Model\"),\n            )\n\
          \            return refitted.model_name\n\n    \"\"\"  # noqa: E501\n  \
          \  import json\n    import os\n    from pathlib import Path\n\n    import\
          \ pandas as pd\n    from autogluon.tabular import TabularPredictor\n\n \
          \   sampling_config = sampling_config or {}\n    split_config = split_config\
          \ or {}\n    model_config = model_config or {}\n\n    test_dataset_df =\
          \ pd.read_csv(test_dataset.path)\n    extra_train_df = pd.read_csv(extra_train_data_path)\
          \ if extra_train_data_path else None\n\n    predictor = TabularPredictor.load(predictor_path)\n\
          \n    # save refitted model to output artifact\n    model_name_full = model_name\
          \ + \"_FULL\"\n    output_path = Path(model_artifact.path) / model_name_full\n\
          \n    # set the name of the model artifact and its metadata\n    model_artifact.metadata[\"\
          display_name\"] = model_name_full\n    model_artifact.metadata[\"context\"\
          ] = {}\n    model_artifact.metadata[\"context\"][\"data_config\"] = {\n\
          \        \"sampling_config\": sampling_config,\n        \"split_config\"\
          : split_config,\n    }\n\n    model_artifact.metadata[\"context\"][\"task_type\"\
          ] = predictor.problem_type\n    model_artifact.metadata[\"context\"][\"\
          label_column\"] = predictor.label\n\n    model_artifact.metadata[\"context\"\
          ][\"model_config\"] = model_config\n    model_artifact.metadata[\"context\"\
          ][\"location\"] = {\n        \"model_directory\": f\"{model_name_full}\"\
          ,\n        \"predictor\": f\"{model_name_full}/predictor/predictor.pkl\"\
          ,\n    }\n\n    # clone the predictor to the output artifact path and delete\
          \ unnecessary models\n    predictor_clone = predictor.clone(path=output_path\
          \ / \"predictor\", return_clone=True, dirs_exist_ok=True)\n    predictor_clone.delete_models(models_to_keep=[model_name])\n\
          \n    # refit on training + validation data, optionally with extra training\
          \ data\n    predictor_clone.refit_full(model=model_name, train_data_extra=extra_train_df)\n\
          \n    predictor_clone.set_model_best(model=model_name_full, save_trainer=True)\n\
          \    predictor_clone.save_space()\n\n    eval_results = predictor_clone.evaluate(test_dataset_df)\n\
          \    model_artifact.metadata[\"context\"][\"metrics\"] = {\"test_data\"\
          : eval_results}\n    feature_importance = predictor_clone.feature_importance(test_dataset_df)\n\
          \n    # save evaluation results to output artifact\n    os.makedirs(str(output_path\
          \ / \"metrics\"), exist_ok=True)\n    with (output_path / \"metrics\" /\
          \ \"metrics.json\").open(\"w\") as f:\n        json.dump(eval_results, f)\n\
          \n    # save feature importance to output artifact\n    with (output_path\
          \ / \"metrics\" / \"feature_importance.json\").open(\"w\") as f:\n     \
          \   json.dump(feature_importance.to_dict(), f)\n\n    # generate confusion\
          \ matrix for classification problem types\n    if predictor.problem_type\
          \ in {\"binary\", \"multiclass\"}:\n        from autogluon.core.metrics\
          \ import confusion_matrix\n\n        confusion_matrix_res = confusion_matrix(\n\
          \            solution=test_dataset_df[predictor.label],\n            prediction=predictor_clone.predict(test_dataset_df),\n\
          \            output_format=\"pandas_dataframe\",\n        )\n        with\
          \ (output_path / \"metrics\" / \"confusion_matrix.json\").open(\"w\") as\
          \ f:\n            json.dump(confusion_matrix_res.to_dict(), f)\n\n    #\
          \ Notebook generation\n\n    # NOTE: The generated notebook expects that\
          \ a connection secret is available in the environment where it is run.\n\
          \    # This connection should provide the same environment variables as\
          \ required by the pipeline input secret,\n    # i.e. AWS_ACCESS_KEY_ID,\
          \ AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, and AWS_DEFAULT_REGION,\n    #\
          \ plus the variable AWS_S3_BUCKET for S3 bucket access.\n\n    problem_type\
          \ = predictor.problem_type\n    match problem_type:\n        case \"regression\"\
          :\n            notebook_file = \"regression_notebook.ipynb\"\n        case\
          \ \"binary\" | \"multiclass\":\n            notebook_file = \"classification_notebook.ipynb\"\
          \n        case _:\n            raise ValueError(f\"Invalid problem type:\
          \ {problem_type}\")\n\n    import os\n\n    with open(os.path.join(notebooks.path,\
          \ notebook_file), \"r\", encoding=\"utf-8\") as f:\n        notebook = json.load(f)\n\
          \n    # Improved retrieve_pipeline_name: trims only the run id or suffix\n\
          \    def retrieve_pipeline_name(pipeline_name: str) -> str:\n        \"\"\
          \"Attempts to infer the original pipeline name from a name that may have\
          \ a run id or suffix at the end.\n\n        Removes only the last dash-separated\
          \ element (the run id or variant),\n        handling trailing dashes gracefully\
          \ to avoid dropping real name segments.\n        If only a single element\
          \ exists, returns as is.\n        \"\"\"\n        if not pipeline_name:\n\
          \            return pipeline_name\n        # Strip trailing dashes for robust\
          \ splitting\n        name = pipeline_name.rstrip(\"-\")\n        if \"-\"\
          \ not in name:\n            return name\n        tokens = name.split(\"\
          -\")\n        if len(tokens) <= 1:\n            return tokens[0] if tokens\
          \ else \"\"\n        return \"-\".join(tokens[:-1])\n\n    pipeline_name\
          \ = retrieve_pipeline_name(pipeline_name)\n\n    # Replace <REPLACE_RUN_ID>,\
          \ <REPLACE_PIPELINE_NAME>, <REPLACE_MODEL_NAME>, <REPLACE_SAMPLE_ROW> anywhere\
          \ in code cells. # noqa: E501\n    def replace_placeholder_in_notebook(notebook,\
          \ replacements):\n        for cell in notebook.get(\"cells\", []):\n   \
          \         if cell.get(\"cell_type\") != \"code\":\n                continue\n\
          \            # Replace in every string of the source list\n            new_source\
          \ = []\n            for line in cell.get(\"source\", []):\n            \
          \    for placeholder, value in replacements.items():\n                 \
          \   line = line.replace(placeholder, value)\n                new_source.append(line)\n\
          \            cell[\"source\"] = new_source\n        return notebook\n\n\
          \    sample_row_list = json.loads(sample_row)\n\n    # remove label column\
          \ from sample row\n    sample_row_formatted = [\n        {col: value for\
          \ col, value in row.items() if col != predictor.label} for row in sample_row_list\n\
          \    ]\n\n    replacements = {\n        \"<REPLACE_RUN_ID>\": run_id,\n\
          \        \"<REPLACE_PIPELINE_NAME>\": pipeline_name,\n        \"<REPLACE_MODEL_NAME>\"\
          : model_name_full,\n        \"<REPLACE_SAMPLE_ROW>\": str(sample_row_formatted),\n\
          \    }\n    notebook = replace_placeholder_in_notebook(notebook, replacements)\n\
          \n    notebook_path = output_path / \"notebooks\"\n    notebook_path.mkdir(parents=True,\
          \ exist_ok=True)\n    with (notebook_path / \"automl_predictor_notebook.ipynb\"\
          ).open(\"w\", encoding=\"utf-8\") as f:\n        json.dump(notebook, f)\n\
          \n    model_artifact.metadata[\"context\"][\"location\"][\"notebook\"] =\
          \ (\n        f\"{model_name_full}/notebooks/automl_predictor_notebook.ipynb\"\
          \n    )\n\n    return NamedTuple(\"outputs\", model_name=str)(model_name=model_name_full)\n\
          \n"
        image: registry.redhat.io/rhoai/odh-pipeline-runtime-datascience-cpu-py312-rhel9@sha256:f9844dc150592a9f196283b3645dda92bd80dfdb3d467fa8725b10267ea5bdbc
    exec-automl-data-loader:
      container:
        args:
          - --executor_input
          - '{{$}}'
          - --function_to_execute
          - automl_data_loader
        command:
          - sh
          - -c
          - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
          - sh
          - -ec
          - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
          - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef automl_data_loader(  # noqa: D417\n    file_key: str,\n    bucket_name:\
          \ str,\n    workspace_path: str,\n    label_column: str,\n    sampled_test_dataset:\
          \ dsl.Output[dsl.Dataset],\n    sampling_method: Optional[str] = None,\n\
          \    task_type: str = \"regression\",\n    split_config: Optional[dict]\
          \ = None,\n    selection_train_size: float = 0.3,\n) -> NamedTuple(\n  \
          \  \"outputs\",\n    sample_config=dict,\n    split_config=dict,\n    sample_row=str,\n\
          \    models_selection_train_data_path=str,\n    extra_train_data_path=str,\n\
          ):\n    \"\"\"Automl Data Loader component.\n\n    Loads tabular (CSV) data\
          \ from S3 in batches, sampling up to 1GB of data,\n    then splits the sampled\
          \ data into test, selection-train, and extra-train sets.\n\n    The component\
          \ reads data in chunks to efficiently handle large files without\n    loading\
          \ the entire dataset into memory at once. After sampling, it performs\n\
          \    a two-stage split:\n\n    1. **Primary split** (default 80/20): separates\
          \ a *test set* (20%, written to\n       the ``sampled_test_dataset`` S3\
          \ artifact) from the *train portion* (80%).\n\n    2. **Secondary split**\
          \ (default 30/70 of the train portion): produces\n       ``models_selection_train_dataset.csv``\
          \ (30%, used for model selection) and\n       ``extra_train_dataset.csv``\
          \ (70%, passed to ``refit_full`` as extra data).\n       Both are written\
          \ to the PVC workspace under ``{workspace_path}/datasets/``.\n\n    For\
          \ **regression** tasks the split is random; for **binary** and **multiclass**\n\
          \    tasks the split is **stratified** by the label column by default.\n\
          \n    Authentication uses AWS-style credentials provided via environment\
          \ variables\n    (e.g. from a Kubernetes secret).\n\n    Args:\n       \
          \ file_key: S3 object key of the CSV file.\n        bucket_name: S3 bucket\
          \ name containing the file.\n        workspace_path: PVC workspace directory\
          \ where train CSVs will be written.\n        label_column: Name of the label/target\
          \ column in the dataset.\n        sampled_test_dataset: Output dataset artifact\
          \ for the test split.\n        sampling_method: \"first_n_rows\", \"stratified\"\
          , or \"random\"; if None, derived from task_type.\n        task_type: \"\
          binary\", \"multiclass\", or \"regression\" (default); used when sampling_method\
          \ is None.\n        split_config: Split configuration dictionary. Available\
          \ keys: \"test_size\" (float), \"random_state\" (int), \"stratify\" (bool).\n\
          \        selection_train_size: Fraction of the train portion used for model\
          \ selection (default 0.3).\n\n    Raises:\n        ValueError: If sampling_method\
          \ or task_type is invalid, or if required parameters are missing.\n\n  \
          \  Returns:\n        NamedTuple: Contains sample config, split config, a\
          \ sample row, and paths to selection-train and extra-train CSVs.\n    \"\
          \"\"  # noqa: E501\n    import io\n    import logging\n    import os\n\n\
          \    import boto3\n    import pandas as pd\n\n    logger = logging.getLogger(__name__)\n\
          \n    MAX_SIZE_BYTES = 1024 * 1024 * 1024  # 1GB limit in bytes\n    PANDAS_CHUNK_SIZE\
          \ = 10000  # Rows per batch for streaming read\n    DEFAULT_RANDOM_STATE\
          \ = 42\n\n    VALID_SAMPLING_METHODS = {\"first_n_rows\", \"stratified\"\
          , \"random\"}\n    VALID_TASK_TYPES = {\"binary\", \"multiclass\", \"regression\"\
          }\n\n    if sampling_method is not None and sampling_method not in VALID_SAMPLING_METHODS:\n\
          \        raise ValueError(f\"Invalid sampling_method '{sampling_method}'.\
          \ Must be one of {VALID_SAMPLING_METHODS}.\")\n\n    if task_type not in\
          \ VALID_TASK_TYPES:\n        raise ValueError(f\"Invalid task_type '{task_type}'.\
          \ Must be one of {VALID_TASK_TYPES}.\")\n\n    if sampling_method is None:\n\
          \        if task_type in (\"binary\", \"multiclass\"):\n            sampling_method\
          \ = \"stratified\"\n        else:\n            sampling_method = \"random\"\
          \n        logger.info(\"Sampling method derived from task_type=%s: using\
          \ %s\", task_type, sampling_method)\n    else:\n        if sampling_method\
          \ == \"stratified\" and task_type not in (\"binary\", \"multiclass\"):\n\
          \            raise ValueError(\n                \"Stratified sampling is\
          \ only available when task_type is \"\n                \"'binary' or 'multiclass'\
          \ (classification tasks). \"\n                f\"Got task_type='{task_type}'.\"\
          \n            )\n        logger.info(\"Performing sampling: method=%s\"\
          , sampling_method)\n\n    def get_s3_client():\n        \"\"\"Create and\
          \ return an S3 client using credentials from environment variables.\"\"\"\
          \n        access_key = os.environ.get(\"AWS_ACCESS_KEY_ID\")\n        secret_key\
          \ = os.environ.get(\"AWS_SECRET_ACCESS_KEY\")\n        endpoint_url = os.environ.get(\"\
          AWS_S3_ENDPOINT\")\n        region_name = os.environ.get(\"AWS_DEFAULT_REGION\"\
          )\n\n        if (access_key and not secret_key) or (secret_key and not access_key):\n\
          \            raise ValueError(\n                \"S3 credentials misconfigured:\
          \ AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must either \"\n         \
          \       \"both be set and non-empty, or both be unset. Check the Kubernetes\
          \ secret or environment configuration.\"\n            )\n        if not\
          \ access_key and not secret_key:\n            raise ValueError(\n      \
          \          \"S3 credentials missing: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY\
          \ must be provided via \"\n                \"a Kubernetes secret or environment\
          \ configuration when using s3:// dataset URIs.\"\n            )\n\n    \
          \    if not endpoint_url:\n            raise ValueError(\n             \
          \   \"S3 credentials missing: AWS_S3_ENDPOINT must be provided via \"\n\
          \                \"a Kubernetes secret or environment configuration.\"\n\
          \            )\n\n        return boto3.client(\n            \"s3\",\n  \
          \          endpoint_url=endpoint_url,\n            region_name=region_name,\n\
          \            aws_access_key_id=access_key,\n            aws_secret_access_key=secret_key,\n\
          \        )\n\n    def _sample_first_n_rows(text_stream, chunk_size, max_size_bytes):\n\
          \        \"\"\"Take rows from the start of the stream until the size limit\
          \ is reached.\"\"\"\n        chunk_list = []\n        accumulated_size =\
          \ 0\n\n        try:\n            for chunk_df in pd.read_csv(text_stream,\
          \ chunksize=chunk_size):\n                chunk_memory = chunk_df.memory_usage(deep=True).sum()\n\
          \n                if accumulated_size + chunk_memory > max_size_bytes:\n\
          \                    remaining_bytes = max_size_bytes - accumulated_size\n\
          \                    if remaining_bytes <= 0:\n                        #\
          \ No remaining budget; do not take any more rows\n                     \
          \   break\n                    bytes_per_row = chunk_memory / len(chunk_df)\
          \ if len(chunk_df) > 0 else 0\n                    if bytes_per_row > 0:\n\
          \                        rows_to_take = int(remaining_bytes / bytes_per_row)\n\
          \                        if rows_to_take > 0:\n                        \
          \    chunk_df = chunk_df.head(rows_to_take)\n                          \
          \  chunk_list.append(chunk_df)\n                    break\n\n          \
          \      chunk_list.append(chunk_df)\n                accumulated_size +=\
          \ chunk_memory\n\n                if accumulated_size >= max_size_bytes:\n\
          \                    break\n        except Exception as e:\n           \
          \ if not chunk_list:\n                raise ValueError(f\"Error reading\
          \ CSV from S3: {str(e)}\") from e\n\n        return pd.concat(chunk_list,\
          \ ignore_index=True) if chunk_list else pd.DataFrame()\n\n    def _sample_stratified(text_stream,\
          \ chunk_size, max_size_bytes, label_column):\n        \"\"\"Merge batches\
          \ and subsample proportionally by target column to stay under the size limit.\"\
          \"\"\n        subsampled_data = None\n\n        try:\n            for chunk_df\
          \ in pd.read_csv(text_stream, chunksize=chunk_size):\n                if\
          \ label_column not in chunk_df.columns:\n                    raise ValueError(\n\
          \                        f\"Target column '{label_column}' not found in\
          \ the dataset. \"\n                        f\"Available columns: {list(chunk_df.columns)}\"\
          \n                    )\n                chunk_df = chunk_df.dropna(subset=[label_column])\n\
          \                if chunk_df.empty:\n                    continue\n\n  \
          \              combined_data = (\n                    pd.concat([subsampled_data,\
          \ chunk_df], ignore_index=True)\n                    if subsampled_data\
          \ is not None\n                    else chunk_df\n                )\n  \
          \              combined_memory = combined_data.memory_usage(deep=True).sum()\n\
          \n                if combined_memory <= max_size_bytes:\n              \
          \      subsampled_data = combined_data\n                else:\n        \
          \            sampling_frac = max_size_bytes / combined_memory\n        \
          \            subsampled_data = (\n                        combined_data.groupby(label_column,\
          \ group_keys=False)\n                        .apply(lambda x: x.sample(frac=sampling_frac,\
          \ random_state=DEFAULT_RANDOM_STATE))\n                        .reset_index(drop=True)\n\
          \                    )\n\n        except Exception as e:\n            logger.debug(\"\
          Error reading CSV and stratified sampling: %s\", e, exc_info=True)\n   \
          \         if subsampled_data is None or subsampled_data.empty:\n       \
          \         raise ValueError(f\"Error reading CSV from S3: {str(e)}\") from\
          \ e\n\n        if subsampled_data is None:\n            return pd.DataFrame()\n\
          \        return subsampled_data.sample(frac=1, random_state=DEFAULT_RANDOM_STATE).reset_index(drop=True)\n\
          \n    def _sample_random(text_stream, chunk_size, max_size_bytes):\n   \
          \     \"\"\"Iterate all batches, merge with accumulated data, randomly subsample\
          \ when over the limit.\"\"\"\n        subsampled_data = None\n\n       \
          \ try:\n            for chunk_df in pd.read_csv(text_stream, chunksize=chunk_size):\n\
          \                data = (\n                    pd.concat([subsampled_data,\
          \ chunk_df], ignore_index=True)\n                    if subsampled_data\
          \ is not None\n                    else chunk_df\n                )\n  \
          \              combined_memory = data.memory_usage(deep=True).sum()\n\n\
          \                if combined_memory <= max_size_bytes:\n               \
          \     subsampled_data = data\n                else:\n                  \
          \  sampling_frac = max_size_bytes / combined_memory\n                  \
          \  subsampled_data = data.sample(frac=sampling_frac, random_state=DEFAULT_RANDOM_STATE).reset_index(\n\
          \                        drop=True\n                    )\n\n          \
          \  return subsampled_data if subsampled_data is not None else pd.DataFrame()\n\
          \n        except Exception as e:\n            if subsampled_data is None\
          \ or subsampled_data.empty:\n                raise ValueError(f\"Error reading\
          \ CSV from S3: {str(e)}\") from e\n            return subsampled_data\n\n\
          \    def load_data_in_batches(\n        s3_client,\n        bucket_name,\n\
          \        file_key,\n        max_size_bytes,\n        sampling_method,\n\
          \        label_column,\n    ):\n        \"\"\"Load CSV from S3 in batches\
          \ and return a sampled dataframe using the chosen strategy.\"\"\"\n    \
          \    if sampling_method == \"stratified\" and label_column is None:\n  \
          \          raise ValueError(\"label_column must be provided when sampling_method='stratified'\"\
          )\n\n        response = s3_client.get_object(Bucket=bucket_name, Key=file_key)\n\
          \        text_stream = io.TextIOWrapper(response[\"Body\"], encoding=\"\
          utf-8\")\n\n        if sampling_method == \"stratified\":\n            return\
          \ _sample_stratified(text_stream, PANDAS_CHUNK_SIZE, max_size_bytes, label_column)\n\
          \        if sampling_method == \"random\":\n            return _sample_random(text_stream,\
          \ PANDAS_CHUNK_SIZE, max_size_bytes)\n        return _sample_first_n_rows(text_stream,\
          \ PANDAS_CHUNK_SIZE, max_size_bytes)\n\n    s3_client = get_s3_client()\n\
          \    sampled_dataframe = load_data_in_batches(\n        s3_client,\n   \
          \     bucket_name,\n        file_key,\n        max_size_bytes=MAX_SIZE_BYTES,\n\
          \        sampling_method=sampling_method,\n        label_column=label_column,\n\
          \    )\n\n    n_samples = len(sampled_dataframe)\n    logger.info(\"Read\
          \ %d rows from s3://%s/%s (sampling_method=%s)\", n_samples, bucket_name,\
          \ file_key, sampling_method)\n\n    # --- Train/test split ---\n    from\
          \ pathlib import Path\n\n    from sklearn.model_selection import train_test_split\n\
          \n    DEFAULT_TEST_SIZE = 0.2\n    DEFAULT_SPLIT_RANDOM_STATE = 42\n\n \
          \   split_config = split_config or {}\n    test_size = split_config.get(\"\
          test_size\", DEFAULT_TEST_SIZE)\n    random_state = split_config.get(\"\
          random_state\", DEFAULT_SPLIT_RANDOM_STATE)\n\n    if not sampled_test_dataset.uri\
          \ or not sampled_test_dataset.uri.endswith(\".csv\"):\n        sampled_test_dataset.uri\
          \ = (sampled_test_dataset.uri or \"sampled_test_dataset\") + \".csv\"\n\n\
          \    # Features and target\n    X = sampled_dataframe.drop(columns=[label_column],\
          \ inplace=False)\n    y = sampled_dataframe[label_column]\n\n    stratify_effective\
          \ = task_type != \"regression\" and split_config.get(\"stratify\", True)\n\
          \n    # Primary split: train vs test\n    X_train, X_test, y_train, y_test\
          \ = train_test_split(\n        X,\n        y,\n        test_size=test_size,\n\
          \        stratify=(y if stratify_effective else None),\n        random_state=random_state,\n\
          \    )\n\n    # Secondary split: selection train vs extra train\n    X_sel,\
          \ X_extra, y_sel, y_extra = train_test_split(\n        X_train,\n      \
          \  y_train,\n        test_size=(1 - selection_train_size),\n        stratify=(y_train\
          \ if stratify_effective else None),\n        random_state=random_state,\n\
          \    )\n\n    X_y_sel = pd.concat([X_sel, y_sel], axis=1)\n    X_y_extra\
          \ = pd.concat([X_extra, y_extra], axis=1)\n    X_y_test = pd.concat([X_test,\
          \ y_test], axis=1)\n\n    # Write selection train and extra train to PVC\
          \ workspace\n    datasets_dir = Path(workspace_path) / \"datasets\"\n  \
          \  datasets_dir.mkdir(parents=True, exist_ok=True)\n    models_selection_train_data_path\
          \ = str(datasets_dir / \"models_selection_train_dataset.csv\")\n    extra_train_data_path\
          \ = str(datasets_dir / \"extra_train_dataset.csv\")\n    X_y_sel.to_csv(models_selection_train_data_path,\
          \ index=False)\n    X_y_extra.to_csv(extra_train_data_path, index=False)\n\
          \n    # Write test to S3 artifact\n    X_y_test.to_csv(sampled_test_dataset.path,\
          \ index=False)\n\n    # Sample row for downstream use (JSON string to avoid\
          \ NaN issues)\n    sample_row = X_y_test.head(1).to_json(orient=\"records\"\
          )\n\n    return NamedTuple(\n        \"outputs\",\n        sample_config=dict,\n\
          \        split_config=dict,\n        sample_row=str,\n        models_selection_train_data_path=str,\n\
          \        extra_train_data_path=str,\n    )(\n        sample_config={\"n_samples\"\
          : n_samples},\n        split_config={\n            \"test_size\": test_size,\n\
          \            \"random_state\": random_state,\n            \"stratify\":\
          \ stratify_effective,\n        },\n        sample_row=sample_row,\n    \
          \    models_selection_train_data_path=models_selection_train_data_path,\n\
          \        extra_train_data_path=extra_train_data_path,\n    )\n\n"
